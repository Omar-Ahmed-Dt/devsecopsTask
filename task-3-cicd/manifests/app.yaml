apiVersion: apps/v1
kind: Deployment
metadata:
  name: task3-fastapi
  namespace: staging
  labels:
    app: task3-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task3-fastapi
  template:
    metadata:
      labels:
        app: task3-fastapi
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: task3-fastapi
          image: __REGISTRY_IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9090
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task3-fastapi-env
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
