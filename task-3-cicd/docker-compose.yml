services:
  db:
    image: postgres:16-alpine
    container_name: task3-postgres
    environment:
      POSTGRES_DB: app_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_test_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: task3-fastapi:${IMAGE_TAG}
    container_name: task3-fastapi
    environment:
      DATABASE_URL: postgresql://app:app_test_password@db:5432/app_test
    ports:
      - "9090:9090"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
